# RideshareOdoMeter - Gradle Configuration
# Optimized for Codespaces headless builds (mobile-only constraint)

# Gradle JVM arguments - increased memory for headless compilation
org.gradle.jvmargs=-Xmx2048m

# Enable parallel build
org.gradle.parallel=true

# Enable build cache
org.gradle.caching=true

# Kotlin compiler settings
kotlin.code.style=official
kotlin.incremental=true

# Android Gradle Plugin settings
android.useAndroidX=true
android.enableJetifier=true

# Gradle daemon - disable for CI/CD environments
org.gradle.daemon=true

# Build features
android.defaults.buildFeatures.buildConfig=true
android.defaults.buildFeatures.aidl=false
android.defaults.buildFeatures.renderScript=false
android.defaults.buildFeatures.resValues=true
android.defaults.buildFeatures.shaders=false

# Version information
android.compileSdkVersion=34
android.minSdkVersion=26
android.targetSdkVersion=34